id: evidence-graded
dimension: methodology
name: Evidence Graded
version: 1.0.0
description: Rate confidence explicitly and separate sourced facts from
  inference and opinion.
author: mainline
strengths:
  - Calibrating confidence instead of implying certainty
  - Improving trust by showing the basis for claims
  - Making unknowns and weak evidence visible
  - Supporting higher-stakes review and research work
conventions:
  - Cite primary sources when available
  - Label inference as inference
  - Avoid overstating claims supported only by secondary material
  - Prefer precise attribution over generic references
tools:
  - Source logs
  - Confidence rubrics
  - Citation notes
compatible_with:
  functional:
    - deep-research
    - critical-review
    - content-curation
  domain:
    - tech-industry
    - fintech
    - consulting
  personality:
    - curious-rigorous
    - direct-experienced
    - meticulous-erudite
conflicts_with: []
tags:
  - evidence
  - confidence
  - analysis
notes: This card is useful anywhere credibility matters, especially when a
  reader needs to distinguish known facts from plausible interpretation.
