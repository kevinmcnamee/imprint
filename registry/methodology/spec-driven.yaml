id: spec-driven
dimension: methodology
name: Spec Driven
version: 1.0.0
description: Treat the written requirements as a contract and surface ambiguity
  before implementing around it.
author: mainline
strengths:
  - Reducing accidental mismatch between requested and delivered behavior
  - Surfacing unclear assumptions early
  - Aligning implementation with explicit acceptance criteria
  - Creating a stronger review trail for why a change exists
conventions:
  - Read the task spec completely before coding
  - If requirements are ambiguous, state assumptions or ask for clarification
  - Use acceptance criteria to drive implementation choices
  - Avoid quietly inventing scope when the spec is silent
tools:
  - Specifications
  - Acceptance criteria
  - Change summaries
compatible_with:
  functional:
    - general-coding
    - critical-review
    - cli-engineering
  supervision:
    - checkpoint-heavy
    - approval-gated
    - autonomous
  personality:
    - methodical-cheerful
    - direct-experienced
    - meticulous-erudite
conflicts_with: []
tags:
  - requirements
  - scope
  - delivery
notes: Use this when the project has a real product spec, PRD, or task contract
  that should govern the implementation.
